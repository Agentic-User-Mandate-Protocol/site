name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict --site-dir public

      - name: Smoke static site
        run: |
          python3 -m http.server --bind 127.0.0.1 --directory public 4173 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in {1..20}; do
            curl --fail --silent http://127.0.0.1:4173/ >/tmp/aump-site.html && break
            sleep 0.25
          done
          curl --fail --silent --show-error http://127.0.0.1:4173/ >/tmp/aump-site.html
          curl --fail --silent --show-error http://127.0.0.1:4173/specification/action-evaluation/ >/tmp/aump-action.html
          curl --fail --silent --show-error http://127.0.0.1:4173/bindings/a2a/ >/tmp/aump-a2a.html
          curl --fail --silent --show-error http://127.0.0.1:4173/conformance/ >/tmp/aump-conformance.html
          curl --fail --silent --show-error http://127.0.0.1:4173/llms.txt >/tmp/aump-llms.txt
